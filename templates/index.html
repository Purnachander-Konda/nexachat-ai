<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NexaChat AI – Your intelligent conversational assistant powered by advanced AI.">
  <meta name="author" content="Purnachander Konda">
  <title>{{ project_name }} | Intelligent Chat Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <header>
    <div class="header-brand">
      <span class="logo-icon">&#x2B22;</span>
      <h1>{{ project_name }}</h1>
    </div>
    <span class="header-tagline">Intelligent Chat Assistant</span>
  </header>

  <div id="layout">
    <!-- 3D Avatar Column -->
    <div id="avatar-column">
      <canvas id="renderCanvas"></canvas>
      <div id="robot-description">
        <span class="robot-emoji">&#129302;</span>
        Meet your AI assistant — here to chat, learn, and help with anything you need!
      </div>
    </div>

    <!-- Chat Interface -->
    <main>
      <div id="chatbox">
        <div class="ai-msg welcome-msg">
          <strong>NexaChat:</strong> Hi there! I'm your AI assistant. Ask me anything to get started.
        </div>
      </div>
      <div id="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off"
          onkeydown="if(event.key==='Enter') sendPrompt()">
        <button onclick="sendPrompt()" id="sendBtn" aria-label="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 Purnachander Konda. All rights reserved.</p>
  </footer>

  <script>
    const chatbox = document.getElementById("chatbox");

    function addMessage(sender, text) {
      const msgDiv = document.createElement("div");
      msgDiv.className = sender === "user" ? "user-msg" : "ai-msg";
      msgDiv.innerHTML = `<strong>${sender === "user" ? "You" : "NexaChat"}:</strong> ${text}`;
      chatbox.appendChild(msgDiv);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function sendPrompt() {
      const input = document.getElementById("userInput");
      const prompt = input.value.trim();
      if (!prompt) return;

      addMessage("user", prompt);
      input.value = "";

      // Show typing indicator
      const typing = document.createElement("div");
      typing.className = "ai-msg typing-indicator";
      typing.innerHTML = "<strong>NexaChat:</strong> <span class='dots'><span>.</span><span>.</span><span>.</span></span>";
      chatbox.appendChild(typing);
      chatbox.scrollTop = chatbox.scrollHeight;

      fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      })
      .then(res => res.json())
      .then(data => {
        chatbox.removeChild(typing);
        addMessage("ai", data.response);
      })
      .catch(err => {
        chatbox.removeChild(typing);
        addMessage("ai", "Error: " + err.message);
      });
    }

    // Babylon.js 3D assistant setup
    const canvas = document.getElementById("renderCanvas");
    if (canvas) {
      const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

      const createScene = async () => {
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color4(0.176, 0.169, 0.282, 1);
        const camera = new BABYLON.ArcRotateCamera("camera", Math.PI / 2, Math.PI / 2.5, 4, BABYLON.Vector3.Zero(), scene);
        camera.attachControl(canvas, true);

        const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
        light.intensity = 1.3;

        const result = await BABYLON.SceneLoader.ImportMeshAsync("", "/static/assets/3d/", "RobotExpressive.glb", scene);
        result.meshes[0].scaling = new BABYLON.Vector3(1.2, 1.2, 1.2);

        return scene;
      };

      createScene().then(scene => {
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
      });
    }
  </script>
</body>
</html>
